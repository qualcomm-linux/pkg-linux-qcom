name: build-kernel-deb

on:
  workflow_dispatch:
    inputs:
      kernel-branch:
        description: 'Kernel branch or tag to build'
        required: false
        default: 'qcom-next'
      kernel-url:
        description: 'Custom kernel repo URL (leave empty for qualcomm-linux/kernel)'
        required: false
        default: ''
      latest-tag:
        description: 'Use latest qcom-next-* tag (ignores kernel-branch)'
        type: boolean
        default: false
      localversion:
        description: 'LOCALVERSION suffix (e.g. qcom-next-20260312). Omit if the tree provides it via localversion* files.'
        required: false
        default: ''
      kver-extra:
        description: 'Extra suffix appended to the package version (e.g. -ci42)'
        required: false
        default: ''
      self-pr:
        description: 'pkg-linux-qcom PR number to apply before building (e.g. 42)'
        required: false
        default: ''
      build-mode:
        description: 'Build mode: docker (uses docker-pkg-build) or native (dpkg-buildpackage)'
        required: false
        default: 'docker'
        type: choice
        options:
          - docker
          - native
      distro:
        description: 'Target distro'
        required: false
        default: 'trixie'
        type: choice
        options:
          - trixie
          - noble
          - questing
          - resolute
          - sid

jobs:
  build:
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]

    env:
      KERNEL_BRANCH: ${{ github.event.inputs.kernel-branch || 'qcom-next' }}
      KERNEL_URL: ${{ github.event.inputs.kernel-url || 'https://github.com/qualcomm-linux/kernel' }}
      DISTRO: ${{ github.event.inputs.distro || 'trixie' }}
      BUILD_MODE: ${{ github.event.inputs.build-mode || 'docker' }}

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Apply packaging PR (if specified)
        if: ${{ inputs.self-pr != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Applying pkg-linux-qcom PR #${{ inputs.self-pr }}..."
          git fetch origin pull/${{ inputs.self-pr }}/head:pr-${{ inputs.self-pr }}
          git checkout pr-${{ inputs.self-pr }}

      # TODO: switch to qualcomm-linux/docker-pkg-build@main once
      # https://github.com/abickett/docker-pkg-build/tree/dev/kernel-native-build
      # is merged upstream.
      - name: Checkout docker-pkg-build
        if: ${{ env.BUILD_MODE == 'docker' }}
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/docker-pkg-build
          ref: main
          path: docker-pkg-build

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper bc bison flex libssl-dev libelf-dev dwarves \
            python3 kmod cpio rsync pkg-config gcc make build-essential

      - name: Build kernel package
        run: |
          ARGS=(--build-mode "$BUILD_MODE" --distro "$DISTRO" --repo "$KERNEL_URL")

          if [[ "$BUILD_MODE" == "docker" ]]; then
            ARGS+=(--docker-build "$GITHUB_WORKSPACE/docker-pkg-build/docker_deb_build.py")
            ARGS+=(--skip-gbp)
          fi

          if [[ "${{ inputs.latest-tag }}" == "true" ]]; then
            ARGS+=(--latest-tag)
          else
            # Detect whether KERNEL_BRANCH is a branch or a tag
            git ls-remote --exit-code --heads "$KERNEL_URL" "$KERNEL_BRANCH" \
              && ARGS+=(--branch "$KERNEL_BRANCH") \
              || ARGS+=(--tag "$KERNEL_BRANCH")
          fi

          [[ -n "${{ inputs.localversion }}" ]] && ARGS+=(--localversion "${{ inputs.localversion }}")
          [[ -n "${{ inputs.kver-extra }}" ]]   && ARGS+=(--kver-extra "${{ inputs.kver-extra }}")

          ./build-kernel.sh "${ARGS[@]}"

      - name: Upload kernel packages
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs-${{ env.DISTRO }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/../kernel-build/${{ env.DISTRO }}/*.deb
          if-no-files-found: error
