name: build-kernel-deb

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Target suite'
        required: false
        default: 'trixie'
        type: choice
        options:
          - trixie
          - forky
          - noble
          - questing
          - resolute
          - sid
      latest-tag:
        description: 'Use latest qcom-next-* tag (ignores kernel-branch)'
        type: boolean
        default: true
      kernel-branch:
        description: 'Kernel branch or tag when latest-tag=false'
        required: false
        default: 'qcom-next'
      kernel-url:
        description: 'Custom kernel repo URL (leave empty for qualcomm-linux/kernel)'
        required: false
        default: ''
      srcpkg:
        description: 'Source package name'
        required: false
        default: 'linux-qcom-next'
      binpkg:
        description: 'Binary metapackage name'
        required: false
        default: 'linux-image-qcom-next'
      kernel-config:
        description: 'Comma-separated config fragments from debian/config-available/ to activate'
        required: false
        default: 'squashfs,systemd-boot,qcom-imsdk,docker,qemu-boot,usb-can'
      debian-revision:
        description: 'Debian revision component of the package version (e.g. 0qcom1)'
        required: false
        default: '0qcom1'
      target-workspace:
        description: 'Debusine target workspace for release promotion (leave empty for daily/S3 path)'
        required: false
        default: ''
      localversion:
        description: 'Override LOCALVERSION suffix (auto-derived from tag if not set)'
        required: false
        default: ''
      kver-extra:
        description: 'Extra suffix appended to the package version (e.g. -ci42)'
        required: false
        default: ''
      debug-build:
        description: 'Enable debug build'
        type: boolean
        required: false
        default: false
      pkg-linux-qcom-ref:
        description: 'pkg-linux-qcom packaging ref (branch or commit)'
        required: false
        default: 'qcom/debian/latest'
      self-pr:
        description: 'pkg-linux-qcom PR number to apply before building (e.g. 42)'
        required: false
        default: ''
      qcom-next-pr:
        description: 'Space-separated PR numbers to merge from qcom-next (e.g. "42 43")'
        type: string
        required: false
        default: ''
      kernel-topics-pr:
        description: 'Space-separated PR numbers from kernel-topics to apply as patches'
        type: string
        required: false
        default: ''

  # Called by daily.yml and release.yml as a reusable workflow.
  workflow_call:
    inputs:
      suite:
        description: 'Target suite (trixie, forky, noble, questing, resolute, sid)'
        type: string
        default: 'trixie'
      latest-tag:
        description: 'Use latest qcom-next-* tag'
        type: boolean
        default: true
      kernel-branch:
        description: 'Kernel branch or tag when latest-tag=false'
        type: string
        default: 'qcom-next'
      git-clone:
        description: 'Kernel repository URL'
        type: string
        default: 'https://github.com/qualcomm-linux/kernel'
      srcpkg:
        description: 'Source package name'
        type: string
        default: 'linux-qcom-next'
      binpkg:
        description: 'Binary metapackage name'
        type: string
        default: 'linux-image-qcom-next'
      kernel-config:
        description: 'Comma-separated config fragments to activate from debian/config-available/'
        type: string
        default: 'squashfs,systemd-boot,qcom-imsdk,docker,qemu-boot,usb-can'
      debian-revision:
        description: 'Debian revision component of the package version'
        type: string
        default: '0qcom1'
      target-workspace:
        description: 'Debusine target workspace for release promotion (empty = daily/S3 path)'
        type: string
        default: ''
      pkg-linux-qcom-ref:
        description: 'pkg-linux-qcom packaging ref'
        type: string
        default: 'qcom/debian/latest'

permissions:
  contents: read
  packages: read

jobs:
  # ---------------------------------------------------------------------------
  # resolve: classify the target suite as 'debian' or 'ubuntu'.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve suite family
    runs-on: ubuntu-latest
    outputs:
      family: ${{ steps.classify.outputs.family }}
    steps:
      - name: Classify suite
        id: classify
        shell: bash
        run: |
          suite="${{ inputs.suite || 'trixie' }}"
          case "$suite" in
            trixie|forky|sid|unstable|bookworm)
              family=debian ;;
            *)
              family=ubuntu ;;
          esac
          echo "family=$family" >> "$GITHUB_OUTPUT"
          echo "Suite '$suite' classified as family=$family"

  # ---------------------------------------------------------------------------
  # prepare: clone kernel source, inject packaging, run prepare-source.sh.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare kernel source
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]

    env:
      KERNEL_URL: ${{ inputs.git-clone || inputs.kernel-url || 'https://github.com/qualcomm-linux/kernel' }}
      DISTRO: ${{ inputs.suite || 'trixie' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout pkg-linux-qcom
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pkg-linux-qcom-ref || 'qcom/debian/latest' }}

      - name: Checkout CI scripts
        # ci/scripts/ lives on the CI branch (main), not on the packaging branch
        # (qcom/debian/latest). Check out the CI branch into a separate path so
        # resolve-kernel-ref.sh and derive-localversion.sh are available.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .ci-branch
          sparse-checkout: ci/scripts
          fetch-depth: 1

      - name: Install CI scripts into workspace
        run: |
          mkdir -p ci/scripts
          cp .ci-branch/ci/scripts/*.sh ci/scripts/
          chmod +x ci/scripts/*.sh
          rm -rf .ci-branch

      - name: Apply packaging PR (if specified)
        if: ${{ inputs.self-pr != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SELF_PR: ${{ inputs.self-pr }}
        run: |
          [[ "$SELF_PR" =~ ^[0-9]+$ ]] || { echo "ERROR: self-pr must be numeric (got '$SELF_PR')"; exit 1; }
          echo "Applying pkg-linux-qcom PR #$SELF_PR..."
          git fetch origin "pull/$SELF_PR/head:pr-$SELF_PR"
          git checkout "pr-$SELF_PR"

      - name: Checkout docker-pkg-build
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/docker-pkg-build
          ref: main
          path: docker-pkg-build

      - name: Build docker image
        run: |
          ./docker-pkg-build/docker_deb_build.py --rebuild -d "$DISTRO"
          docker image ls

      - name: Resolve kernel ref
        id: kernel-ref
        run: |
          set -euo pipefail
          USE_LATEST="${{ inputs.latest-tag }}"
          BRANCH="${{ inputs.kernel-branch || 'qcom-next' }}"

          # For scheduled runs and daily builds, always resolve latest tag.
          if [[ "${{ github.event_name }}" == "schedule" || "$USE_LATEST" == "true" ]]; then
            KERNEL_REF=$(ci/scripts/resolve-kernel-ref.sh --url "$KERNEL_URL" --latest)
          else
            KERNEL_REF=$(ci/scripts/resolve-kernel-ref.sh --url "$KERNEL_URL" --ref "$BRANCH")
          fi

          echo "KERNEL_REF=$KERNEL_REF" >> "$GITHUB_ENV"
          echo "Resolved kernel ref: $KERNEL_REF"

      - name: Clone kernel source
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel-source"
          echo "KERNEL_DIR=$KERNEL_DIR" >> "$GITHUB_ENV"
          echo "Cloning $KERNEL_URL @ $KERNEL_REF (shallow)..."
          git clone --depth 1 --single-branch --branch "$KERNEL_REF" --no-tags \
            "$KERNEL_URL" "$KERNEL_DIR"
          KERNEL_SHA=$(git -C "$KERNEL_DIR" rev-parse HEAD)
          echo "KERNEL_SHA=$KERNEL_SHA" >> "$GITHUB_ENV"
          echo "Kernel HEAD SHA: $KERNEL_SHA"

      - name: Derive LOCALVERSION
        run: |
          set -euo pipefail
          OVERRIDE_LV="${{ inputs.localversion }}"
          if [[ -n "$OVERRIDE_LV" ]]; then
            echo "Using explicit LOCALVERSION override: $OVERRIDE_LV"
            echo "LOCALVERSION=$OVERRIDE_LV" >> "$GITHUB_ENV"
          else
            LOCALVERSION=$(ci/scripts/derive-localversion.sh \
              --ref "$KERNEL_REF" \
              --sha "$(echo "$KERNEL_SHA" | cut -c1-12)")
            echo "LOCALVERSION=$LOCALVERSION" >> "$GITHUB_ENV"
            echo "Derived LOCALVERSION: $LOCALVERSION"
          fi

      - name: Merge qcom-next PR patches
        if: ${{ inputs.qcom-next-pr != '' }}
        env:
          QCOM_NEXT_PR: ${{ inputs.qcom-next-pr }}
        run: |
          cd "$KERNEL_DIR"
          echo "Merging qcom-next PR(s): $QCOM_NEXT_PR"
          for pr in $QCOM_NEXT_PR; do
            [[ "$pr" =~ ^[0-9]+$ ]] || { echo "::error::invalid qcom-next PR number: $pr"; exit 1; }
            echo "::group::Merging qcom-next PR #$pr"
            git fetch --no-tags origin "pull/$pr/head:pr-$pr"
            if ! git merge --no-ff --no-commit "pr-$pr"; then
              echo "ERROR: Merge conflict while merging PR #$pr. Aborting."
              git merge --abort || true
              exit 1
            fi
            if ! git diff --cached --quiet; then
              git commit -m "Merged qcom-next PR #$pr"
              echo "PR #$pr merged successfully."
            else
              echo "PR #$pr already present; nothing to merge."
            fi
            echo "::endgroup::"
          done

      - name: Apply kernel-topics PR patches
        if: ${{ inputs.kernel-topics-pr != '' }}
        env:
          KERNEL_TOPICS_PR: ${{ inputs.kernel-topics-pr }}
        run: |
          cd "$KERNEL_DIR"
          echo "Applying kernel-topics PR patch(es): $KERNEL_TOPICS_PR"
          for pr in $KERNEL_TOPICS_PR; do
            [[ "$pr" =~ ^[0-9]+$ ]] || { echo "::error::invalid kernel-topics PR number: $pr"; exit 1; }
            echo "::group::Applying kernel-topics PR #$pr"
            wget -q "https://github.com/qualcomm-linux/kernel-topics/pull/$pr.patch" -O "$pr.patch"
            if ! git am "$pr.patch"; then
              echo "ERROR: Patch application failed for PR #$pr. Aborting."
              git am --abort || true
              exit 1
            fi
            echo "PR #$pr applied successfully."
            echo "::endgroup::"
          done

      - name: Prepare source
        run: |
          # No -x here: keep xtrace off for this step as it assembles the
          # prepare-source.sh argument list which may include sensitive paths.
          set -euo pipefail

          ARGS=(
            --source-dir "$KERNEL_DIR"
            --distro "$DISTRO"
            --srcpkg "${{ inputs.srcpkg || 'linux-qcom-next' }}"
            --binpkg "${{ inputs.binpkg || 'linux-image-qcom-next' }}"
            --debian-revision "${{ inputs.debian-revision || '0qcom1' }}"
          )

          [[ -n "$LOCALVERSION" ]]                          && ARGS+=(--localversion "$LOCALVERSION")
          [[ -n "${{ inputs.kver-extra }}" ]]               && ARGS+=(--kver-extra "${{ inputs.kver-extra }}")
          [[ -n "${{ inputs.kernel-config || '' }}" ]]      && ARGS+=(--kernel-config "${{ inputs.kernel-config || '' }}")
          [[ "${{ inputs.debug-build }}" == "true" ]]       && ARGS+=(--debug)

          docker run -i --rm \
            -v "$PWD:$PWD" --workdir="$PWD" \
            "ghcr.io/qualcomm-linux/pkg-builder:$DISTRO" \
            ./prepare-source.sh "${ARGS[@]}"

      - name: Upload prepared source tree
        run: |
          tar czf /tmp/kernel-srcpkg.tar.gz \
            -C "$(dirname "$KERNEL_DIR")" \
            "$(basename "$KERNEL_DIR")"

      - name: Upload prepared source tree artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-srcpkg
          path: /tmp/kernel-srcpkg.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # debusine-build: Debian suites only (trixie, forky, sid).
  # ---------------------------------------------------------------------------
  debusine-build:
    name: Build in Debusine
    needs: [resolve, prepare]
    if: ${{ needs.resolve.outputs.family == 'debian' }}
    uses: ./.github/workflows/build-kernel-debusine.yml
    with:
      suite: ${{ inputs.suite || 'trixie' }}
      srcpkg: ${{ inputs.srcpkg || 'linux-qcom-next' }}
      debusine-parent-workspace: ${{ vars.DEBUSINE_PARENT_WORKSPACE || 'qli-ci' }}
      target-workspace: ${{ inputs.target-workspace || '' }}
    secrets:
      DEBUSINE_USER: ${{ secrets.DEBUSINE_USER }}
      DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_TOKEN }}
      DEBUSINE_RELEASE_TOKEN: ${{ secrets.DEBUSINE_RELEASE_TOKEN }}

  # ---------------------------------------------------------------------------
  # ubuntu-build: Ubuntu suites only (noble, questing, resolute).
  # ---------------------------------------------------------------------------
  ubuntu-build:
    name: Build (Ubuntu, docker)
    needs: [resolve, prepare]
    if: ${{ needs.resolve.outputs.family == 'ubuntu' }}
    uses: ./.github/workflows/build-kernel-ubuntu.yml
    with:
      distro: ${{ inputs.suite || 'resolute' }}
      pkg-linux-qcom-ref: ${{ inputs.pkg-linux-qcom-ref || 'qcom/debian/latest' }}
