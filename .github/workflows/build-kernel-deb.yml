name: build-kernel-deb

on:
  workflow_dispatch:
    inputs:
      kernel-branch:
        description: 'Kernel branch or tag to build'
        required: false
        default: 'qcom-next'
      kernel-url:
        description: 'Custom kernel repo URL (leave empty for qualcomm-linux/kernel)'
        required: false
        default: ''
      latest-tag:
        description: 'Use latest qcom-next-* tag (ignores kernel-branch)'
        type: boolean
        default: true
      debug-build:
        description: 'Enable debug build'
        type: boolean
        required: false
        default: false
      localversion:
        description: 'LOCALVERSION suffix (e.g. qcom-next-20260312). Omit if the tree provides it via localversion* files.'
        required: false
        default: ''
      kver-extra:
        description: 'Extra suffix appended to the package version (e.g. -ci42)'
        required: false
        default: ''
      pkg-linux-qcom-ref:
        description: pkg-linux-qcom ref branch or commit
        required: false
        default: 'qcom/debian/latest'
      self-pr:
        description: 'pkg-linux-qcom PR number to apply before building (e.g. 42)'
        required: false
        default: ''
      distro:
        description: 'Target distro'
        required: false
        default: 'trixie'
        type: choice
        options:
          - trixie
          - noble
          - questing
          - resolute
          - sid
      qcom-next-pr:
        description: 'Space-separated PR numbers to merge from qcom-next (e.g. "42 43")'
        type: string
        required: false
        default: ''
      kernel-topics-pr:
        description: 'Space-separated PR numbers from kernel-topics to apply as patches (e.g. "7 8")'
        type: string
        required: false
        default: ''

  # Nightly builds are driven by nightly.yml which reads ci/build-matrix.json
  # and calls this workflow as a reusable workflow for each matrix entry.
  workflow_call:
    inputs:
      distro:
        description: Target distro (trixie, noble, questing, resolute, sid)
        type: string
        default: 'trixie'
      latest-tag:
        description: Use latest qcom-next-* tag
        type: boolean
        default: true
      pkg-linux-qcom-ref:
        description: pkg-linux-qcom ref branch or commit
        type: string
        default: 'qcom/debian/latest'

permissions:
  contents: read
  packages: read
  id-token: write  # Required for Debusine OIDC authentication

env:
  # TODO: update to main once feat/generate-source-package-non-gbp-quilt is merged.
  DEBUSINE_ACTION_REF: feat/generate-source-package-non-gbp-quilt

jobs:
  # ---------------------------------------------------------------------------
  # resolve: classify the target suite as 'debian' or 'ubuntu'.
  #
  # Debian suites (trixie, sid, unstable, bookworm, forky) → Debusine.
  # Ubuntu suites (noble, questing, resolute) → docker build on self-hosted runner.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve suite family
    runs-on: ubuntu-latest
    outputs:
      family: ${{ steps.classify.outputs.family }}
    steps:
      - name: Classify suite
        id: classify
        shell: bash
        run: |
          suite="${{ inputs.distro || 'trixie' }}"
          case "$suite" in
            trixie|sid|unstable|bookworm|forky)
              family=debian ;;
            *)
              family=ubuntu ;;
          esac
          echo "family=$family" >> "$GITHUB_OUTPUT"
          echo "Suite '$suite' classified as family=$family"

  prepare:
    name: Prepare kernel source
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]

    env:
      KERNEL_BRANCH: ${{ inputs.kernel-branch || 'qcom-next' }}
      KERNEL_URL: ${{ inputs.kernel-url || 'https://github.com/qualcomm-linux/kernel' }}
      DISTRO: ${{ inputs.distro || 'trixie' }}

    steps:
      - name: Checkout pkg-linux-qcom
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pkg-linux-qcom-ref || 'qcom/debian/latest' }}

      - name: Apply packaging PR (if specified)
        if: ${{ inputs.self-pr != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Applying pkg-linux-qcom PR #${{ inputs.self-pr }}..."
          git fetch origin pull/${{ inputs.self-pr }}/head:pr-${{ inputs.self-pr }}
          git checkout pr-${{ inputs.self-pr }}

      - name: Extract org and repo name
        run: |
          # Extract org (owner) and repo name from GITHUB_REPOSITORY (format: org/repo)
          echo "ORG_NAME=${GITHUB_REPOSITORY%%/*}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      # TODO: switch to qualcomm-linux/docker-pkg-build@main once
      # https://github.com/abickett/docker-pkg-build/tree/dev/kernel-native-build
      # is merged upstream.
      - name: Checkout docker-pkg-build
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/docker-pkg-build
          ref: main
          path: docker-pkg-build

      - name: Build docker image
        run: |
          ./docker-pkg-build/docker_deb_build.py --rebuild -d "$DISTRO"
          docker image ls

      - name: Sync kernel source
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel-source"
          echo "KERNEL_DIR=$KERNEL_DIR" >> "$GITHUB_ENV"

          # Resolve the latest qcom-next-* tag when explicitly requested or on
          # scheduled runs (inputs are not available for schedule events).
          if [[ "${{ inputs.latest-tag }}" == "true" || "${{ github.event_name }}" == "schedule" ]]; then
            KERNEL_REF=$(git ls-remote --tags "$KERNEL_URL" 'refs/tags/qcom-next-*' \
                         | awk '{print $2}' | sed 's|refs/tags/||' | grep -v '\^{}' \
                         | sort -V | tail -1)
            [[ -n "$KERNEL_REF" ]] || { echo "ERROR: No qcom-next-* tags found in $KERNEL_URL"; exit 1; }
            echo "Resolved latest tag: $KERNEL_REF"
          else
            KERNEL_REF="$KERNEL_BRANCH"
          fi

          echo "KERNEL_REF=$KERNEL_REF" >> "$GITHUB_ENV"
          echo "Cloning $KERNEL_URL @ $KERNEL_REF (shallow)..."
          git clone --depth 1 --single-branch --branch "$KERNEL_REF" --no-tags "$KERNEL_URL" "$KERNEL_DIR"

          KERNEL_SHA=$(git -C "$KERNEL_DIR" rev-parse HEAD)
          echo "KERNEL_SHA=$KERNEL_SHA" >> "$GITHUB_ENV"
          echo "Kernel HEAD SHA: $KERNEL_SHA"

      - name: Resolve LOCALVERSION from kernel ref
        run: |
          # Derive LOCALVERSION directly from KERNEL_REF — no git describe needed.
          # KERNEL_REF is already the resolved tag name from the Sync kernel source
          # step, so we have all the information we need without touching the cloned
          # tree or running git inside the container.
          #
          # Tag builds (latest-tag=true / scheduled):
          #   KERNEL_REF = qcom-next-7.0-rc7-20260429 → LOCALVERSION = qcom-next-20260429
          #   Captures the branch prefix and the date snapshot, dropping the kernel
          #   version in the middle (already encoded in the base KVER).
          #
          # Branch-tip builds (latest-tag=false):
          #   KERNEL_REF = qcom-next (branch name, does not match the tag pattern)
          #   → LOCALVERSION = qcom-next-g<short-sha>
          #   Uses the branch name + short commit SHA to uniquely identify the build.
          #   Two tip builds from the same commit produce the same package name;
          #   two tip builds from different commits are always distinguishable.
          #
          # An explicit localversion input always takes precedence (handled in the
          # Prepare source step below).
          LOCALVERSION=$(echo "$KERNEL_REF" | sed -E 's/^([a-z-]+)-[0-9]+\.[0-9]+.*-([0-9]+)$/\1-\2/')
          if [[ "$LOCALVERSION" != "$KERNEL_REF" ]]; then
            # Tag build: LOCALVERSION derived from tag name
            echo "LOCALVERSION=$LOCALVERSION" >> "$GITHUB_ENV"
            echo "Resolved LOCALVERSION='$LOCALVERSION' from tag '$KERNEL_REF'"
          else
            # Branch-tip build: use branch name + short SHA for uniqueness
            SHORT_SHA=$(echo "$KERNEL_SHA" | cut -c1-12)
            LOCALVERSION="${KERNEL_REF}-g${SHORT_SHA}"
            echo "LOCALVERSION=$LOCALVERSION" >> "$GITHUB_ENV"
            echo "Resolved LOCALVERSION='$LOCALVERSION' from branch tip '$KERNEL_REF' @ $SHORT_SHA"
          fi

      - name: Merge qcom-next PR patches
        if: ${{ inputs.qcom-next-pr != '' }}
        run: |
          cd "$KERNEL_DIR"
          echo "Merging qcom-next PR(s): ${{ inputs.qcom-next-pr }}"
          for pr in ${{ inputs.qcom-next-pr }}; do
            echo "::group::Merging qcom-next PR #$pr"
            git fetch --no-tags origin "pull/$pr/head:pr-$pr"

            if ! git merge "pr-$pr" --no-commit; then
              echo "ERROR: Merge conflict while merging PR #$pr. Aborting."
              git merge --abort || true
              exit 1
            fi

            if ! git diff --cached --quiet; then
              git commit -m "Merged qcom-next PR #$pr"
              echo "PR #$pr merged successfully."
            else
              echo "Nothing to commit for PR #$pr (already merged or fast-forwarded)."
              git merge --abort 2>/dev/null || true
            fi
            echo "::endgroup::"
          done

      - name: Apply kernel-topics PR patches
        if: ${{ inputs.kernel-topics-pr != '' }}
        run: |
          cd "$KERNEL_DIR"
          echo "Applying kernel-topics PR patch(es): ${{ inputs.kernel-topics-pr }}"
          for pr in ${{ inputs.kernel-topics-pr }}; do
            echo "::group::Applying kernel-topics PR #$pr"
            wget -q "https://github.com/qualcomm-linux/kernel-topics/pull/$pr.patch" -O "$pr.patch"

            if ! git am "$pr.patch"; then
              echo "ERROR: Patch application failed for PR #$pr. Aborting."
              git am --abort || true
              exit 1
            fi
            echo "PR #$pr applied successfully."
            echo "::endgroup::"
          done

      - name: Prepare source
        run: |
          # Inject debian/ packaging metadata, activate config fragments, and
          # run 'debian/rules prepare' to generate debian/control and
          # debian/changelog from *.in templates.
          #
          # In docker mode the entire prepare-source.sh is executed inside the
          # distro-matched pkg-builder container for a controlled, reproducible
          # environment. The workspace is bind-mounted (-v $PWD:$PWD) so all
          # generated files are written back to the host filesystem.
          #
          # A subsequent commit will extend prepare-source.sh with --source-pkg
          # support to run dpkg-buildpackage -S for Debusine source packages.
          ARGS=(--source-dir "$KERNEL_DIR" --distro "$DISTRO")

          # Prefer an explicit localversion input; fall back to LOCALVERSION
          # derived from KERNEL_REF in the Resolve LOCALVERSION step above.
          # Passing it explicitly here means prepare-source.sh never needs to
          # run git describe inside the container (no safe.directory concerns).
          EFFECTIVE_LOCALVERSION="${{ inputs.localversion }}"
          [[ -z "$EFFECTIVE_LOCALVERSION" && -n "$LOCALVERSION" ]] && EFFECTIVE_LOCALVERSION="$LOCALVERSION"
          [[ -n "$EFFECTIVE_LOCALVERSION" ]] && ARGS+=(--localversion "$EFFECTIVE_LOCALVERSION")
          [[ -n "${{ inputs.kver-extra }}" ]]   && ARGS+=(--kver-extra "${{ inputs.kver-extra }}")

          # Pass --debug to prepare-source.sh when debug-build is enabled.
          # prepare-source.sh handles copying arch/arm64/configs/debug.config
          # into debian/config/ so it is applied as a standard config fragment.
          [[ "${{ inputs.debug-build }}" == "true" ]] && ARGS+=(--debug)

          docker run -i --privileged --rm \
            -v "$PWD:$PWD" --workdir="$PWD" \
            "ghcr.io/qualcomm-linux/pkg-builder:$DISTRO" \
            ./prepare-source.sh "${ARGS[@]}"

      - name: Upload prepared source tree
        # Archive the kernel source tree as a tar.gz before uploading so that
        # file permissions (execute bits on kernel build scripts) are preserved.
        # actions/upload-artifact uses zip format which strips execute bits;
        # tar preserves them end-to-end.
        run: |
          tar czf /tmp/kernel-srcpkg.tar.gz \
            -C "$(dirname "$KERNEL_DIR")" \
            "$(basename "$KERNEL_DIR")"

      - name: Upload prepared source tree artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-srcpkg
          path: /tmp/kernel-srcpkg.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # debusine-build: Debian suites only (trixie, sid).
  #
  # Downloads the kernel-srcpkg artifact produced by the prepare job and
  # submits it to Debusine for distributed building. The reusable workflow
  # handles source package generation (DEBUSINE_ASSEMBLE_ORIG=true) and
  # Debusine submission.
  # ---------------------------------------------------------------------------
  debusine-build:
    name: Build in Debusine
    needs: [resolve, prepare]
    if: ${{ needs.resolve.outputs.family == 'debian' }}
    # TODO: update ref to @main once feat/reusable-workflow-srcpkg-artifact is merged
    # into qualcomm-linux/qcom-build-utils.
    uses: qualcomm-linux/qcom-build-utils/.github/workflows/qcom-build-pkg-reusable-workflow.yml@feat/reusable-workflow-srcpkg-artifact
    with:
      # qcom-build-utils-ref is required by the reusable workflow but only used
      # in the ubuntu-build job; for Debian/Debusine builds it is not consumed.
      qcom-build-utils-ref: main
      # debian-ref is used by the test job to obtain debian/control for the
      # installability check; the srcpkg-artifact takes precedence for the build.
      debian-ref: ${{ inputs.pkg-linux-qcom-ref || 'qcom/debian/latest' }}
      suite: ${{ inputs.distro || 'trixie' }}
      srcpkg-artifact: kernel-srcpkg
      debusine-parent-workspace: ${{ vars.DEBUSINE_PARENT_WORKSPACE || 'qli-ci' }}
      assemble-orig: true
    secrets:
      DEBUSINE_USER: ${{ secrets.DEBUSINE_USER }}
      DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_TOKEN }}

  # ---------------------------------------------------------------------------
  # ubuntu-build: Ubuntu suites only (noble, questing, resolute).
  #
  # Delegates to build-kernel-ubuntu.yml, which encapsulates the full
  # build-kernel.sh pipeline. Keeping this as a separate reusable workflow
  # means the Ubuntu build path can be deprecated or replaced (e.g. when
  # Debusine gains Ubuntu support) by deleting one file and one job — no
  # surgery on the orchestrator logic below.
  # ---------------------------------------------------------------------------
  ubuntu-build:
    name: Build (Ubuntu, docker)
    needs: [resolve, prepare]
    if: ${{ needs.resolve.outputs.family == 'ubuntu' }}
    uses: ./.github/workflows/build-kernel-ubuntu.yml
    with:
      distro: ${{ inputs.distro || 'resolute' }}
      pkg-linux-qcom-ref: ${{ inputs.pkg-linux-qcom-ref || 'qcom/debian/latest' }}

  # ---------------------------------------------------------------------------
  # upload-artifacts: Debian suites only.
  #
  # Runs after a successful debusine-build. Downloads the built .deb packages
  # from the Debusine workspace via chdist and uploads them to S3.
  # ---------------------------------------------------------------------------
  upload-artifacts:
    name: Download .deb from Debusine and upload to S3
    needs: [resolve, debusine-build]
    if: >-
      ${{ needs.resolve.outputs.family == 'debian' &&
          needs.debusine-build.result == 'success' }}
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout debusine-action helpers
        uses: actions/checkout@v5
        with:
          repository: qualcomm-linux/debusine-action
          ref: ${{ env.DEBUSINE_ACTION_REF }}
          path: debusine-action
          fetch-depth: 1
          sparse-checkout: |
            lib

      - name: Generate Debusine apt configuration
        env:
          DEBUSINE_HOST: ${{ vars.DEBUSINE_HOST }}
          DEBUSINE_SCOPE: ${{ vars.DEBUSINE_SCOPE }}
          DEBUSINE_USER: ${{ secrets.DEBUSINE_USER }}
          DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_TOKEN }}
          DEBUSINE_WORKSPACE: ${{ needs.debusine-build.outputs.workspace }}
          SUITE: ${{ inputs.distro || 'trixie' }}
        run: |
          # generate-apt-config only needs curl; runs directly on the runner.
          debusine-action/lib/generate-apt-config

      - name: Download .deb packages from Debusine workspace
        run: |
          set -euxo pipefail

          # chdist is provided by devscripts.
          sudo apt-get install -y --no-install-recommends devscripts

          mkdir -p "$GITHUB_WORKSPACE/deb-artifacts"

          # Create an isolated apt environment pointing exclusively at the
          # Debusine CI workspace so apt-cache search returns only the
          # packages produced by this build.
          chdist create debusine-workspace
          rm -f ~/.chdist/debusine-workspace/etc/apt/sources.list
          install -d ~/.chdist/debusine-workspace/etc/apt/sources.list.d
          install -d ~/.chdist/debusine-workspace/etc/apt/auth.conf.d
          install -m 0644 debusine-ci.sources \
            ~/.chdist/debusine-workspace/etc/apt/sources.list.d/
          install -m 0600 debusine-ci-auth.conf \
            ~/.chdist/debusine-workspace/etc/apt/auth.conf.d/

          chdist apt-get debusine-workspace update

          packages=$(chdist apt-cache debusine-workspace search . | awk '{print $1}' | tr '\n' ' ')
          echo "Packages to download: $packages"

          cd "$GITHUB_WORKSPACE/deb-artifacts"
          chdist apt-get debusine-workspace download $packages

      - name: Upload .deb packages to S3
        uses: qualcomm-linux/upload-private-artifact-action@aws
        with:
          s3_bucket: qli-prd-lecore-gh-artifacts
          path: deb-artifacts
          destination: ${{ github.repository_owner }}/pkg/temp/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}/