name: build-kernel

# ==============================================================================
# Triggers
# - Manual: workflow_dispatch with optional inputs for refs and PRs.
# - Scheduled: nightly at 9:00 PM PST (05:00 UTC).
# ==============================================================================
on:
  workflow_dispatch:
    inputs:
      qcom-build-utils-ref:
        description: qcom-build-utils ref branch or commit
        required: false
        default: 'main'
      kernel-branch:
        description: Kernel Branch or Tag to sync
        required: false
        default: 'qcom-next'
      qcom-next-pr:
        description: Space-separated PR numbers to merge from qcom-next
        type: string
        required: false
        default: ''
      kernel-topics-pr:
        description: Space-separated list of kernel-topics PR numbers
        type: string
        required: false
        default: ''

    secrets:
      DEB_PKG_BOT_CI_TOKEN:
        required: true

  # Nightly run at 9:00 PM PST (05:00 UTC)
  schedule:
    - cron: '0 5 * * *'

# ==============================================================================
# Jobs
# ==============================================================================
jobs:
  build:
    # Self-hosted runner on ARM64 (Ubuntu 24.04-based build host).
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]

    env:
      # Default kernel branch if workflow_dispatch input is omitted.
      KERNEL_BRANCH: ${{ github.event.inputs.kernel-branch || 'qcom-next' }}

    steps:
      # ------------------------------------------------------------------------
      # 1. Check out pkg-linux-kernel (this repo)
      # ------------------------------------------------------------------------
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # 2. Derive ORG/REPO for metadata + artifact paths
      # ------------------------------------------------------------------------
      - name: Extract org, repo and branch name
        run: |
          # Extract org (owner) and repo name from GITHUB_REPOSITORY (format: org/repo)
          echo "ORG_NAME=${GITHUB_REPOSITORY%%/*}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      - name: Debug print exported env
        run: |
          echo "ORG_NAME=$ORG_NAME"
          echo "REPO_NAME=$REPO_NAME"

      # ------------------------------------------------------------------------
      # 3. Checkout qcom-build-utils into a sibling directory
      # ------------------------------------------------------------------------
      - name: Checkout qcom-build-utils
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/qcom-build-utils
          ref: ${{ inputs.qcom-build-utils-ref }}
          token: ${{ secrets.DEB_PKG_BOT_CI_TOKEN }}
          path: ./qcom-build-utils
          fetch-depth: 1

      - name: Deduce qcom-build-utils head commit SHA
        run: |
          cd qcom-build-utils
          QCOM_BUILD_UTILS_SHA=$(git rev-parse HEAD)
          echo "QCOM_BUILD_UTILS_SHA=$QCOM_BUILD_UTILS_SHA" >> "$GITHUB_ENV"
          echo "Head SHA for qcom-build-utils: $QCOM_BUILD_UTILS_SHA"

      # ------------------------------------------------------------------------
      # 4. Prepare docker build image used for kernel + DTB builds
      # ------------------------------------------------------------------------
      - name: Pull docker image
        run: |
          docker pull artifacts.codelinaro.org/clo-420-qli-registry/kmake-image-ubuntu-noble-arm64:ver.1.0
          docker tag artifacts.codelinaro.org/clo-420-qli-registry/kmake-image-ubuntu-noble-arm64:ver.1.0 kmake-image:ubuntu-noble-arm64

      # ------------------------------------------------------------------------
      # 5. Sync kernel codebase (qcom-next or tag) into qcom-build-utils/kernel
      # ------------------------------------------------------------------------
      - name: Sync kernel codebase
        run: |
          cd qcom-build-utils
          cd kernel && export BUILD_TOP=`pwd`
          echo "build_top=$BUILD_TOP" >> "$GITHUB_ENV"

          export REPO="qualcomm-linux/kernel"
          echo "kernel_repo=$REPO" >> "$GITHUB_ENV"
          echo "Syncing ${REPO} ref ${KERNEL_BRANCH}"

          git ls-remote --exit-code --heads https://${{ secrets.PAT }}@github.com/${REPO}.git ${KERNEL_BRANCH} && IS_BRANCH=true || IS_BRANCH=false

          git init $BUILD_TOP/qcom-next
          cd $BUILD_TOP/qcom-next
          git remote add origin https://${{ secrets.PAT }}@github.com/${REPO}.git

          if [ "$IS_BRANCH" = true ]; then
            echo "Detected branch: ${KERNEL_BRANCH}"
            git fetch --depth=1 origin ${KERNEL_BRANCH}
            git checkout ${KERNEL_BRANCH}
          else
            echo "Assuming tag: ${KERNEL_BRANCH}"
            git fetch --depth=1 origin tag ${KERNEL_BRANCH}
            git checkout FETCH_HEAD
          fi

          QCOM_KERNEL_SHA=$(git rev-parse HEAD)
          echo "QCOM_KERNEL_SHA=$QCOM_KERNEL_SHA" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------------
      # 6. Optionally merge PRs into qcom-next
      # ------------------------------------------------------------------------
      - name: Merge qcom-next PR patches
        run: |
          cd "${{ env.build_top }}/"
          if [ -z "${{ github.event.inputs.qcom-next-pr }}" ]; then
            echo "No PR number specified, skipping merge."
          else
            echo "Merging PR(s) #${{ github.event.inputs.qcom-next-pr }}"
            cd "${{ env.build_top }}/qcom-next"

            for pr in ${{ github.event.inputs.qcom-next-pr }}; do
              echo "::group::Merging qcom-next PR #$pr"
              git fetch "https://${{ secrets.PAT }}@github.com/${{ env.kernel_repo }}.git" "pull/$pr/head:pr-$pr"

              if ! git merge "pr-$pr" --no-commit; then
                echo "Merge conflict while merging PR #$pr. Aborting merge and failing the job."
                git merge --abort || true
                exit 1
              fi

              if ! git diff --cached --quiet; then
                git commit -m "Merged PR #$pr"
              else
                echo "Nothing to commit for PR #$pr (already merged or fast-forwarded)."
                git merge --abort 2>/dev/null || true
              fi
              echo "::endgroup::"
            done
          fi

      # ------------------------------------------------------------------------
      # 7. Optionally apply kernel-topics PR patches
      # ------------------------------------------------------------------------
      - name: Apply kernel-topics PR patches
        run: |
          cd "${{ env.build_top }}/"
          if [ -z "${{ github.event.inputs.kernel-topics-pr }}" ]; then
            echo "Nothing to apply in kernel topics."
          else
            echo "Applying PR(s) from topics branch #${{ github.event.inputs.kernel-topics-pr }}"
            for pr in ${{ github.event.inputs.kernel-topics-pr }}; do
              echo "::group::Applying kernel-topics PR #$pr"
              wget -q "https://github.com/qualcomm-linux/kernel-topics/pull/$pr.patch" -O "$pr.patch"
              cd "${{ env.build_top }}/qcom-next"
              if ! git am "../$pr.patch"; then
                echo "Patch application failed for PR #$pr. Aborting 'git am' and failing the job."
                git am --abort || true
                exit 1
              fi
              echo "::endgroup::"
              cd "${{ env.build_top }}/"
            done
          fi

      # ------------------------------------------------------------------------
      # 8. Enable any required kernel configs (e.g. squashfs)
      # ------------------------------------------------------------------------
      - name: Enable Kernel Configs
        run: |
          cd qcom-build-utils/kernel
          export BUILD_TOP=$(pwd)
          ./scripts/enable_squashfs_configs.sh $BUILD_TOP/qcom-next/

      # ------------------------------------------------------------------------
      # 9. Build the kernel (O=out under qcom-build-utils/kernel)
      # ------------------------------------------------------------------------
      - name: Run build script
        run: |
          docker run -i \
          --privileged --rm -v $PWD:$PWD --workdir="$PWD" kmake-image:ubuntu-noble-arm64 \
          -c '
            cd qcom-build-utils/kernel
            export BUILD_TOP=`pwd`
            ./scripts/build_kernel.sh
          '

      # ------------------------------------------------------------------------
      # 10. Build combined DTB image (dtb.bin) from built DTBs + manifest
      #     - DTBs from: out/arch/arm64/boot/dts/qcom
      #     - Manifest from: pkg-linux-kernel/config/dtb-manifest
      #     - Output: dtb.bin (4 MB FAT image, containing combined-dtb.dtb)
      # ------------------------------------------------------------------------
      - name: Build combined DTB image
        run: |
          docker run -i \
            --privileged --rm -v $PWD:$PWD --workdir="$PWD" kmake-image:ubuntu-noble-arm64 \
            -c '
              set -euo pipefail

              cd qcom-build-utils/kernel
              export BUILD_TOP=$(pwd)

              DTB_SRC="$BUILD_TOP/qcom-next/arch/arm64/boot/dts/qcom"
              MANIFEST="$BUILD_TOP/../../config/dtb-manifest"

              echo "[INFO] DTB_SRC:  $DTB_SRC"
              echo "[INFO] MANIFEST: $MANIFEST"

              if [ ! -d "$DTB_SRC" ]; then
                echo "[ERROR] DTB source directory not found: $DTB_SRC"
                exit 1
              fi

              if [ ! -f "$MANIFEST" ]; then
                echo "[ERROR] DTB manifest not found: $MANIFEST"
                exit 1
              fi

              ./scripts/build-dtb-image.sh \
                -dtb-src "$DTB_SRC" \
                -manifest "$MANIFEST" \
                -size 4 \
                -out dtb.bin

              echo "[INFO] Generated DTB image:"
              ls -lh dtb.bin
            '

      # ------------------------------------------------------------------------
      # 11. Build kernel Debian package (.deb) in qcom-build-utils/kernel
      # ------------------------------------------------------------------------
      - name: Build Kernel Debian Package
        run: |
          docker run -i \
          --privileged --rm -v $PWD:$PWD --workdir="$PWD" kmake-image:ubuntu-noble-arm64 \
          -c '
            set -euo pipefail
            cd qcom-build-utils/kernel
            export BUILD_TOP=`pwd`
            ./scripts/build-kernel-deb.sh out/ ${{ github.run_id }}-${{ github.run_attempt }}
          '

      # ------------------------------------------------------------------------
      # 12. Assemble deb_artifact/ on host:
      #     - All kernel .deb packages
      #     - dtb.bin (combined DTB image) if present
      # ------------------------------------------------------------------------
      - name: Assemble deb artifacts (kernel + dtb image)
        run: |
          set -euo pipefail
          cd qcom-build-utils/kernel

          mkdir -p deb_artifact

          echo "[INFO] Collecting kernel .deb packages into deb_artifact/"
          cp ./*.deb deb_artifact/

          if [ -f dtb.bin ]; then
            echo "[INFO] Attaching dtb.bin to deb_artifact/"
            cp dtb.bin deb_artifact/
          else
            echo "[WARN] dtb.bin not found in $(pwd); skipping DTB artifact copy."
          fi

      # ------------------------------------------------------------------------
      # 13. Generate build_info metadata (written inside deb_artifact/)
      # ------------------------------------------------------------------------
      - name: Generate build_info metadata
        run: |
          docker run -i \
          --privileged --rm -v $PWD:$PWD --workdir="$PWD" kmake-image:ubuntu-noble-arm64 \
          -c '
            cd qcom-build-utils/kernel
            {
              echo "JOB_ID: ${{ github.run_id }}"
              echo "JOB_ATTEMPT: ${{ github.run_attempt }}"
              echo "ORG_NAME: ${{ env.ORG_NAME }}"
              echo "REPO_NAME: ${{ env.REPO_NAME }}"
              echo "QCOM-BUILD-UTILS BRANCH/TAG: ${{ inputs.qcom-build-utils-ref }}"
              echo "QCOM-BUILD-UTILS HEAD SHA: ${{ env.QCOM_BUILD_UTILS_SHA }}"
              echo "KERNEL BRANCH/TAG: ${{ inputs.kernel-branch }}"
              echo "KERNEL HEAD SHA: ${{ env.QCOM_KERNEL_SHA }}"
              echo "PRs FROM QCOM-NEXT: ${{ inputs.qcom-next-pr }}"
              echo "PRs FROM KERNEL TOPICS: ${{ inputs.kernel-topics-pr }}"
            } > deb_artifact/build_info
          '

      # ------------------------------------------------------------------------
      # 14. Upload artifacts directory (kernel debs + dtb.bin + build_info) to S3
      # ------------------------------------------------------------------------
      - name: Upload kernel .deb package to S3
        uses: qualcomm-linux/upload-private-artifact-action@aws
        with:
          s3_bucket: qli-prd-lecore-gh-artifacts
          path: qcom-build-utils/kernel/deb_artifact
          destination: ${{ env.ORG_NAME }}/pkg/temp/${{ env.REPO_NAME }}/${{ github.run_id }}-${{ github.run_attempt }}/
