name: daily

# Daily kernel package builds. Runs at 3:00 PM PST (23:00 UTC), one parallel
# build per Daily entry in ci/build-matrix.json after suite flattening.
# Manual dispatch can run the full Daily matrix or a single suite.
#
# Matrix schema: ci/build-matrix.json
#   Each row with "type": "Daily" is expanded by ci/scripts/resolve-matrix.sh:
#   the "suites" array is flattened into one job per suite. All other fields
#   (srcpkg, binpkg, kernel_config, debian_revision, git_clone, branch_or_tag)
#   are passed through to build-kernel-deb.yml as inputs.
#
# To add a daily build target: add a row to ci/build-matrix.json with
# "type": "Daily". No workflow changes needed.

on:
  schedule:
    # 3:00 PM PST == 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      run-full-matrix:
        description: 'Test Daily Build (runs all Daily matrix entries, same as scheduled)'
        type: boolean
        required: false
        default: false
      suite:
        description: 'Single suite to build (ignored when Test Daily Build is checked)'
        required: false
        default: 'trixie'
        type: choice
        options:
          - trixie
          - forky
          - noble
          - questing
          - resolute
          - sid

permissions:
  contents: read
  packages: read

jobs:
  # ---------------------------------------------------------------------------
  # configure-matrix: flatten the Daily rows from ci/build-matrix.json.
  #
  # Delegates to ci/scripts/resolve-matrix.sh which filters type=Daily rows
  # and expands each row's "suites" array into one flat entry per suite.
  # For manual dispatch of a single suite, passes --single-suite to restrict
  # the output to that suite only.
  # ---------------------------------------------------------------------------
  configure-matrix:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build matrix
        id: set-matrix
        run: |
          set -euo pipefail

          RUN_FULL="${{ github.event.inputs.run-full-matrix }}"
          INPUT_SUITE="${{ github.event.inputs.suite }}"

          if [[ "${{ github.event_name }}" == "schedule" || "$RUN_FULL" == "true" ]]; then
            echo "Source: ci/build-matrix.json (full Daily matrix)"
            MATRIX=$(ci/scripts/resolve-matrix.sh --type Daily)
          else
            echo "Source: ci/build-matrix.json (single suite: $INPUT_SUITE)"
            MATRIX=$(ci/scripts/resolve-matrix.sh --type Daily --single-suite "$INPUT_SUITE")
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix entries: $(echo "$MATRIX" | jq length)"

  # ---------------------------------------------------------------------------
  # build: one parallel job per flat matrix entry.
  #
  # Each entry calls build-kernel-deb.yml as a reusable workflow. The full
  # set of matrix fields (suite, srcpkg, binpkg, kernel_config, etc.) is
  # threaded through as inputs. fail-fast is disabled so a failed trixie
  # build does not cancel the forky build.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.suite }}
    needs: configure-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.configure-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build-kernel-deb.yml
    with:
      suite: ${{ matrix.suite }}
      git-clone: ${{ matrix.git_clone }}
      srcpkg: ${{ matrix.srcpkg }}
      binpkg: ${{ matrix.binpkg }}
      kernel-config: ${{ matrix.kernel_config }}
      debian-revision: ${{ matrix.debian_revision }}
    secrets: inherit
