name: build-kernel-ubuntu

# Reusable workflow: Ubuntu kernel build via build-kernel.sh.
#
# Called by build-kernel-deb.yml when the target suite is Ubuntu-family
# (noble, questing, resolute). The kernel source has already been cloned,
# patched, and prepared (debian/ injected, debian/control + debian/changelog
# generated) by the prepare job in the caller workflow. This workflow
# downloads the kernel-srcpkg artifact and runs build-kernel.sh --skip-prepare
# to go directly to the build step.
#
# The artifact is shared from the caller via github.run_id. Build and S3 upload
# run on the self-hosted runner, which has direct IAM access.

on:
  workflow_call:
    inputs:
      distro:
        description: Target Ubuntu suite (noble, questing, resolute)
        type: string
        required: true
      pkg-linux-qcom-ref:
        description: |
          pkg-linux-qcom ref to check out. Provides build-kernel.sh and the
          debian/ packaging tree. Should match the ref used by the caller's
          prepare job so that build-kernel.sh is consistent with the prepared
          source tree.
        type: string
        default: 'qcom/debian/latest'

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build kernel package
    runs-on: [self-hosted, lecore-prd-u2404-arm64-xlrg-od-ephem]
    env:
      DISTRO: ${{ inputs.distro }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout pkg-linux-qcom
        # build-kernel.sh; ref must match the caller's prepare job.
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pkg-linux-qcom-ref }}

      # Pinned to @main while native kernel-build support is still landing
      # upstream in qualcomm-linux/docker-pkg-build.
      - name: Checkout docker-pkg-build
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/docker-pkg-build
          ref: main
          path: docker-pkg-build

      - name: Build docker image
        run: |
          # --rebuild forces a fresh suite-matched pkg-builder image.
          ./docker-pkg-build/docker_deb_build.py --rebuild -d "$DISTRO"
          docker image ls

      - name: Download prepared source tree
        uses: actions/download-artifact@v4
        with:
          name: kernel-srcpkg
          path: /tmp/srcpkg-artifact

      - name: Extract prepared source tree
        run: |
          # tar.gz preserves the execute bits that upload-artifact's zip would
          # strip (see README); --strip-components=1 drops the archive's top dir.
          mkdir -p kernel-source
          tar xzf /tmp/srcpkg-artifact/*.tar.gz \
            -C kernel-source --strip-components=1
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel-source" >> "$GITHUB_ENV"

      - name: Build kernel package
        run: |
          # Kernel source was cloned, patched, and prepared by the caller's
          # prepare job. Pass --local-source and --skip-prepare so
          # build-kernel.sh goes directly to the build step.
          # debian/control, debian/changelog, and all config fragments are
          # already baked into the extracted source tree; no re-derivation
          # of LOCALVERSION, kver-extra, or debug config is needed here.
          ./build-kernel.sh \
            --build-mode docker \
            --distro "$DISTRO" \
            --local-source "$KERNEL_DIR" \
            --skip-prepare \
            --docker-build "$GITHUB_WORKSPACE/docker-pkg-build/docker_deb_build.py"

      - name: Upload .deb packages to S3
        # build-kernel.sh outputs to kernel-build/<distro>/ by default.
        # Upload from that subdirectory directly so the suite name does not
        # appear in the S3 path; downstream consumers (e.g. qcom-distro-images)
        # expect the flat pkg/temp/<repo>/<run_id>-<attempt>/ layout.
        uses: qualcomm-linux/upload-private-artifact-action@aws-v4
        with:
          s3_bucket: ${{ vars.ARTIFACT_S3_BUCKET }}
          path: kernel-build/${{ inputs.distro }}
          destination: ${{ github.repository_owner }}/pkg/temp/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}/
